version: '3.8'

services:
  canopy:
    build:
      context: .
      dockerfile: .docker/Dockerfile
    container_name: canopy-node
    restart: unless-stopped
    ports:
      - "${P2P_PORT:-9000}:9000"
      - "${RPC_PORT:-50051}:50051"
      - "${REST_PORT:-8080}:8080"
    volumes:
      - canopy-data:/root/.canopy
    environment:
      - CANOPY_ENV=${CANOPY_ENV:-mainnet}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    networks:
      - canopy-net

  auto-update:
    build:
      context: .
      dockerfile: .docker/auto-update/Dockerfile
    container_name: canopy-auto-update
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - canopy-data:/root/.canopy
    environment:
      - UPDATE_INTERVAL=${UPDATE_INTERVAL:-3600}
      - CANOPY_CONTAINER=canopy-node
      # using my personal fork for testing purposes
      - GITHUB_REPO=${GITHUB_REPO:-canopy-network/canopy}
    depends_on:
      - canopy
    networks:
      - canopy-net

volumes:
  canopy-data:
    driver: local

networks:
  canopy-net:
    driver: bridge
